[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sentinel-shared"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "psycopg2-binary>=2.9",
    "pydantic[email]>=2.0",
    "pydantic-settings>=2.0",
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0",
    "aiobotocore>=2.9",
    "firebase-admin>=6.0",
    "anthropic>=0.40",
    "openai>=1.0",
    "boto3>=1.34",
    "structlog>=24.0",
    "tenacity>=8.0",
    "alembic>=1.13",
    "sentry-sdk[fastapi]>=2.0",
    "jinja2>=3.1",
    "httpx>=0.27",
]
