x-backend-common: &backend-common
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

x-sentry-common: &sentry-common
  image: getsentry/sentry:latest
  environment: &sentry-env
    SENTRY_SECRET_KEY: "${SENTRY_SECRET_KEY:-super-secret-change-me-in-production}"
    SENTRY_POSTGRES_HOST: postgres
    SENTRY_POSTGRES_PORT: "5432"
    SENTRY_DB_NAME: sentry
    SENTRY_DB_USER: sentinel
    SENTRY_DB_PASSWORD: sentinel
    SENTRY_REDIS_HOST: redis
    SENTRY_REDIS_PORT: "6379"
    SENTRY_SERVER_EMAIL: "sentry@sentinel.dev"
    SENTRY_EMAIL_HOST: ""
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped
  profiles:
    - sentry

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-sentry-db.sh:/docker-entrypoint-initdb.d/init-sentry-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api-gateway:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile

  auth-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile

  tenant-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile

  ingestion-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    # ports:                                                                                                                                                    
    #   - "8003:8003" 

  ingestion-worker:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    command: python main.py

  voter-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/voter-service/Dockerfile
    command: python main.py

  ai-pipeline-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ai-pipeline-service/Dockerfile
    command: python main.py

  analytics-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile

  campaign-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile

  notification-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile

  logging-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/logging-service/Dockerfile

  # Sentry self-hosted (optional, activate with --profile sentry)
  # Uses shared postgres (separate 'sentry' DB) and redis
  sentry-web:
    <<: *sentry-common
    ports:
      - "9000:9000"
    command: sentry run web --bind 0.0.0.0:9000

  sentry-worker:
    <<: *sentry-common
    command: sentry run worker

  sentry-cron:
    <<: *sentry-common
    command: sentry run cron

  frontend:
    build:
      context: ./frontend
    env_file: .env
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
