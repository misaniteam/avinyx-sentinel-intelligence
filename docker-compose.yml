x-backend-common: &backend-common
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api-gateway:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile

  auth-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile

  tenant-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile

  ingestion-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile

  ingestion-worker:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    command: python main.py

  ai-pipeline-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/ai-pipeline-service/Dockerfile
    command: python main.py

  analytics-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile

  campaign-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile

  notification-service:
    <<: *backend-common
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile

  frontend:
    build:
      context: ./frontend
    env_file: .env
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
