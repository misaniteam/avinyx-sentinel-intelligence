# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api-gateway:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:3000"
